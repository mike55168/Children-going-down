<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小朋友下樓梯</title>
<style>
  :root{
    --bg:#1b1230;
    --wall:#3a2a5e;
    --ink:#f5ecff;
    --accent:#ffc83d;
    --danger:#ff5d73;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:radial-gradient(circle at 50% 20%, #2a1b4d 0%, var(--bg) 70%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:"Microsoft JhengHei","PingFang TC",system-ui,sans-serif;
    color:var(--ink);overflow:hidden;touch-action:none;
  }
  #wrap{position:relative;}
  canvas{
    display:block;
    border:6px solid var(--wall);
    border-radius:14px;
    background:#241845;
    box-shadow:0 18px 60px rgba(0,0,0,.55), inset 0 0 80px rgba(0,0,0,.35);
    image-rendering:pixelated;
  }
  #hud{
    position:absolute;top:12px;left:18px;right:14px;
    display:flex;justify-content:space-between;align-items:center;
    pointer-events:none;font-weight:700;
    text-shadow:0 2px 4px rgba(0,0,0,.6);
  }
  #floor{font-size:20px;letter-spacing:1px;}
  #hudRight{display:flex;align-items:center;gap:10px;}
  #pauseBtn{
    pointer-events:auto;width:34px;height:34px;border-radius:50%;
    border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);
    color:var(--ink);font-size:15px;cursor:pointer;line-height:1;
  }
  #pauseBtn:active{background:rgba(255,255,255,.3);}
  #hp{display:flex;gap:3px;}
  .heart{width:16px;height:16px;}
  #mpBoard{
    position:absolute;top:70px;right:14px;pointer-events:none;
    font-size:12px;text-align:right;line-height:1.7;
    text-shadow:0 1px 3px rgba(0,0,0,.8);opacity:.92;
  }
  #mpBoard .me{color:var(--accent);font-weight:700;}
  #overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-start;gap:14px;
    background:rgba(20,10,40,.78);border-radius:10px;
    backdrop-filter:blur(3px);text-align:center;padding:24px;
    overflow-y:auto;
  }
  #overlay > :first-child{margin-top:auto;}
  #overlay > :last-child{margin-bottom:auto;}
  #overlay.hidden{display:none;}
  #overlay.lite{background:rgba(20,10,40,.45);}
  #overlay h1{font-size:34px;color:var(--accent);letter-spacing:4px;}
  #overlay h1.huge{font-size:80px;}
  #overlay p{line-height:1.8;opacity:.9;font-size:15px;}
  #overlay .big{font-size:26px;color:var(--accent);}
  button.start{
    margin-top:6px;padding:12px 36px;font-size:18px;font-weight:700;
    border:none;border-radius:999px;cursor:pointer;
    background:var(--accent);color:#3a2400;font-family:inherit;
    box-shadow:0 6px 0 #b8860b;transition:transform .08s;
  }
  button.start:active{transform:translateY(4px);box-shadow:0 2px 0 #b8860b;}
  button.start.alt{background:#7f77dd;color:#fff;box-shadow:0 6px 0 #534ab7;}
  button.start:disabled{opacity:.45;cursor:not-allowed;}
  #nameInput, .txtInput{
    width:220px;padding:11px 16px;font-size:17px;text-align:center;
    border-radius:999px;border:2px solid rgba(255,255,255,.3);
    background:rgba(255,255,255,.1);color:var(--ink);
    font-family:inherit;outline:none;
  }
  #nameInput:focus, .txtInput:focus{border-color:var(--accent);}
  #nameInput::placeholder, .txtInput::placeholder{color:rgba(245,236,255,.4);}
  #nameErr, .errMsg{color:var(--danger);font-size:13px;min-height:18px;margin:0;}
  table.rank{
    border-collapse:collapse;font-size:15px;min-width:250px;
    background:rgba(255,255,255,.05);border-radius:10px;overflow:hidden;
  }
  table.rank th, table.rank td{padding:6px 14px;text-align:left;}
  table.rank th{
    background:rgba(255,255,255,.1);color:var(--accent);
    font-size:13px;letter-spacing:2px;
  }
  table.rank td.num{text-align:center;width:40px;}
  table.rank td.score{text-align:right;}
  table.rank tr.me td{background:rgba(255,200,61,.18);color:var(--accent);font-weight:700;}
  .linkBtn{
    background:none;border:none;color:rgba(245,236,255,.55);
    font-size:13px;cursor:pointer;text-decoration:underline;font-family:inherit;
  }
  .linkBtn:hover{color:var(--ink);}
  #charGrid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
    width:100%;max-width:320px;
  }
  .charCell{
    display:flex;flex-direction:column;align-items:center;gap:1px;
    padding:5px 2px;border-radius:10px;cursor:pointer;
    border:2px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.06);
    color:var(--ink);font-family:inherit;font-size:11px;
  }
  .charCell:hover{background:rgba(255,255,255,.14);}
  .charCell.sel{
    border-color:var(--accent);
    background:rgba(255,200,61,.16);
    color:var(--accent);font-weight:700;
  }
  .charCell.taken{opacity:.38;cursor:not-allowed;}
  .charCell canvas{image-rendering:pixelated;}
  .lobbyList{
    width:100%;max-width:300px;display:flex;flex-direction:column;gap:6px;
  }
  .lobbyRow{
    display:flex;align-items:center;gap:10px;padding:6px 12px;
    background:rgba(255,255,255,.07);border-radius:10px;font-size:14px;
  }
  .lobbyRow canvas{image-rendering:pixelated;}
  .lobbyRow .nm{flex:1;text-align:left;}
  .lobbyRow .rdy{font-size:12px;color:#7CFC9A;}
  .lobbyRow .wait{font-size:12px;opacity:.5;}
  .roomCode{
    font-size:38px;letter-spacing:10px;color:var(--accent);font-weight:900;
    background:rgba(255,255,255,.08);padding:6px 20px 6px 30px;border-radius:14px;
  }
  .modeBtn{
    width:240px;padding:18px;font-size:20px;font-weight:700;border:none;
    border-radius:16px;cursor:pointer;font-family:inherit;color:#fff;
    box-shadow:0 6px 0 rgba(0,0,0,.35);transition:transform .08s;
  }
  .modeBtn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.35);}
  .modeBtn small{display:block;font-size:12px;font-weight:400;opacity:.85;margin-top:4px;}
  #spectateBar{
    position:absolute;left:0;right:0;top:70px;display:none;
    justify-content:center;align-items:center;gap:14px;pointer-events:none;
  }
  #spectateBar .msg{
    background:rgba(0,0,0,.55);padding:6px 16px;border-radius:999px;
    font-size:14px;
  }
  #spectateBar button{
    pointer-events:auto;width:34px;height:34px;border-radius:50%;border:none;
    background:rgba(255,255,255,.2);color:var(--ink);font-size:16px;cursor:pointer;
  }
  #touch{
    display:none;width:100%;max-width:480px;
    justify-content:space-between;margin-top:14px;gap:14px;
  }
  .pad{
    flex:1;height:74px;border-radius:18px;border:none;
    background:rgba(255,255,255,.12);color:var(--ink);
    font-size:34px;font-weight:900;cursor:pointer;user-select:none;
    border:2px solid rgba(255,255,255,.18);
  }
  .pad:active{background:rgba(255,255,255,.3);}
  @media (pointer:coarse){ #touch{display:flex;} }
  #tip{margin-top:10px;font-size:13px;opacity:.55;}
  @media (pointer:coarse){ #tip{display:none;} }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="420" height="640"></canvas>
  <div id="hud">
    <div id="floor">第 0 層</div>
    <div id="hudRight">
      <div id="hp"></div>
      <button id="pauseBtn" title="暫停">⏸</button>
    </div>
  </div>
  <div id="mpBoard"></div>
  <div id="spectateBar">
    <button id="specPrev">◀</button>
    <div class="msg" id="specMsg"></div>
    <button id="specNext">▶</button>
  </div>
  <div id="overlay"></div>
</div>
<div id="touch">
  <button class="pad" id="leftPad">◀</button>
  <button class="pad" id="rightPad">▶</button>
</div>
<div id="tip">鍵盤 ← → / A D 控制 · Esc 或 P 暫停</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
(() => {
"use strict";
const cvs = document.getElementById("game");
const ctx = cvs.getContext("2d");
const W = cvs.width, H = cvs.height;

const overlay = document.getElementById("overlay");
const floorEl = document.getElementById("floor");
const hpEl = document.getElementById("hp");
const mpBoardEl = document.getElementById("mpBoard");
const spectateBar = document.getElementById("spectateBar");
const specMsg = document.getElementById("specMsg");

// ----- 常數 -----
const MAX_HP = 10;
const PLAT_H = 16;
const PLAT_W = 96;
const CEIL_H = 58;            // 天花板尖刺位置(上方留出資訊列的牆面區)
const GRAVITY = 0.45;
const MOVE_SPEED = 4.2;
const TYPES = { NORMAL:0, SPIKE:1, BELT_L:2, BELT_R:3, FRAGILE:4, SPRING:5 };

// ----- 後端設定 -----
// ★ Google 試算表排行榜(已設定)
const SHEET_API = "https://script.google.com/macros/s/AKfycbyn9-EoTE7XF1N2s82B__rHltrzEdcgINlByi7UhpYfo3HjZ7sHkkjS27Hwxr57blhI/exec";
// ★★★ 多人模式設定:照教學建立 Firebase 後,把設定物件貼在下面 ★★★
// 範例:const FIREBASE_CONFIG = { apiKey:"...", authDomain:"...", databaseURL:"...", projectId:"..." };
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAzE4rb0_4YhGjQBn3QhHAi5PyaiUW1XTw",
  authDomain: "children-going-down.firebaseapp.com",
  databaseURL: "https://children-going-down-default-rtdb.firebaseio.com",
  projectId: "children-going-down",
  storageBucket: "children-going-down.firebasestorage.app",
  messagingSenderId: "79098785940",
  appId: "1:79098785940:web:2fbef79dd2df1761338481"
};
// 未填寫時,多人模式按鈕會顯示「尚未啟用」,單人模式完全不受影響。

// ----- 狀態 -----
// state: menu | play | paused(單人) | dead(單人結束)
//        mpcount(開賽倒數) | mppause(全員暫停) | spectate(觀戰) | mpend(本場排名)
let state = "menu";
let gameMode = "single";      // single | multi
let player, plats, scrollSpeed, depth, floorCount, hp, invul, shake, time;
let nextPlatWY, nextPlatIdx, platRng, mapSeed;
let keys = { left:false, right:false };
let playerName = "";

// ----- 本機儲存 -----
const LB_KEY = "stairs_leaderboard";
const NAME_KEY = "stairs_last_name";
const CHAR_KEY = "stairs_char";
const PID_KEY = "stairs_pid";
const BOARD_CACHE_KEY = "stairs_board_cache";
let memStore = {};
function storeGet(k){
  try { return localStorage.getItem(k); } catch(e){ return memStore[k] ?? null; }
}
function storeSet(k, v){
  try { localStorage.setItem(k, v); } catch(e){ memStore[k] = v; }
}

// ----- 排行榜(Google 試算表) -----
function loadBoard(){
  try { return JSON.parse(storeGet(LB_KEY)) || []; } catch(e){ return []; }
}
function saveScoreLocal(name, floor){
  let board = loadBoard();
  board.push({ name, floor, t: Date.now() });
  const best = {};
  board.forEach(e => {
    if(!best[e.name] || e.floor > best[e.name].floor) best[e.name] = e;
  });
  board = Object.values(best);
  board.sort((a,b) => b.floor - a.floor || a.t - b.t);
  board.length = Math.min(board.length, 10);
  storeSet(LB_KEY, JSON.stringify(board));
}
function deviceInfo(){
  const ua = navigator.userAgent;
  let type = "電腦";
  if(/iPad|Tablet/i.test(ua)) type = "平板";
  else if(/Mobi|Android|iPhone/i.test(ua)) type = "手機";
  let os = "其他系統";
  if(/Windows/i.test(ua)) os = "Windows";
  else if(/Android/i.test(ua)) os = "Android";
  else if(/iPhone|iPad|iPod/i.test(ua)) os = "iOS";
  else if(/Mac/i.test(ua)) os = "Mac";
  else if(/Linux/i.test(ua)) os = "Linux";
  let browser = "其他瀏覽器";
  if(/Edg\//.test(ua)) browser = "Edge";
  else if(/Chrome\//.test(ua)) browser = "Chrome";
  else if(/Firefox\//.test(ua)) browser = "Firefox";
  else if(/Safari\//.test(ua)) browser = "Safari";
  return type + " · " + os + " · " + browser;
}
async function submitScore(name, floor, mode){
  if(!SHEET_API){ saveScoreLocal(name, floor); return; }
  try{
    await fetch(SHEET_API, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({ name, floor, device: deviceInfo(), mode: mode || "單人" })
    });
  }catch(e){ /* 離線時略過 */ }
}
async function fetchBoard(){
  if(!SHEET_API) return loadBoard();
  try{
    const r = await fetch(SHEET_API + "?t=" + Date.now());
    return await r.json();
  }catch(e){ return null; }
}
function mergeBoard(board, current){
  let all = board.slice();
  if(current) all.push({ name: current.name, floor: current.floor, t: Date.now() });
  const best = {};
  all.forEach(e => {
    if(!best[e.name] || e.floor > best[e.name].floor) best[e.name] = e;
  });
  return Object.values(best).sort((a,b) => b.floor - a.floor || a.t - b.t).slice(0, 10);
}
async function loadBoardArea(current, limit){
  const el = document.getElementById("boardArea");
  if(!el) return;
  const render = board => {
    const el2 = document.getElementById("boardArea");
    if(!el2) return;
    let b = mergeBoard(board, current);
    if(limit) b = b.slice(0, limit);
    el2.innerHTML = b.length ? boardHTML(b, current)
      : '<p style="font-size:13px;opacity:.6;">還沒有人留下紀錄,快來搶頭香!</p>';
  };
  let cached = [];
  try{ cached = JSON.parse(storeGet(BOARD_CACHE_KEY)) || []; }catch(e){}
  if(cached.length) render(cached);
  else el.innerHTML = '<p style="font-size:13px;opacity:.6;">排行榜載入中…</p>';

  const board = await fetchBoard();
  if(board === null){
    if(!cached.length){
      const el2 = document.getElementById("boardArea");
      if(el2) el2.innerHTML = '<p style="font-size:13px;opacity:.6;">⚠️ 無法連上排行榜,請檢查網路</p>';
    }
  } else {
    storeSet(BOARD_CACHE_KEY, JSON.stringify(board));
    render(board);
  }
}
function boardHTML(board, current){
  let rows = "";
  let marked = false;
  board.forEach((e, i) => {
    const medal = ["🥇","🥈","🥉"][i] || (i+1);
    const isMe = !marked && current && e.name === current.name && e.floor === current.floor;
    if(isMe) marked = true;
    rows += "<tr" + (isMe ? ' class="me"' : "") + '><td class="num">' + medal + "</td><td>" +
            escapeHTML(String(e.name)) + '</td><td class="score">' + e.floor + " 層</td></tr>";
  });
  return '<table class="rank"><tr><th colspan="3">🏆 排行榜</th></tr>' + rows + "</table>";
}
function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

// ----- 種子亂數與地圖生成(多人同圖的基礎) -----
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const rand = (a,b) => a + Math.random()*(b-a);          // 視覺特效用,不影響地圖
const srand = (a,b) => a + platRng()*(b-a);             // 地圖專用的種子亂數

function makePlat(x, wy, type){
  return { x, wy, w:PLAT_W, h:PLAT_H, type, broken:false, breakT:0, beltPhase:0, springT:0, landed:false };
}
function platTypeByIndex(n){
  const hard = Math.min(0.5, n / 250);   // 越深越難
  const r = platRng();
  if(r < 0.42 - hard*0.3) return TYPES.NORMAL;
  if(r < 0.58) return TYPES.SPIKE;
  if(r < 0.70) return TYPES.BELT_L;
  if(r < 0.82) return TYPES.BELT_R;
  if(r < 0.93) return TYPES.FRAGILE;
  return TYPES.SPRING;
}
// 確保平台已生成到指定世界深度(每塊平台固定消耗 3 個亂數,保證跨裝置一致)
function ensurePlats(uptoWY){
  while(nextPlatWY < uptoWY){
    nextPlatWY += srand(70, 112);
    const x = srand(10, W - PLAT_W - 10);
    plats.push(makePlat(x, nextPlatWY, platTypeByIndex(nextPlatIdx)));
    nextPlatIdx++;
  }
}

function reset(mode, seed){
  gameMode = mode || "single";
  mapSeed = (seed === undefined || seed === null) ? Math.floor(Math.random()*2147483647) : seed;
  platRng = mulberry32(mapSeed);
  player = { x: W/2 - 13, wy: 140, w: 26, h: 30, vx:0, vy:0, onPlat:null, face:1, squash:0 };
  plats = [];
  scrollSpeed = 1.4;
  depth = 0; floorCount = 0;
  hp = MAX_HP; invul = 0; shake = 0; time = 0;
  lastThemeIdx = 0; themeMsg = ""; themeMsgT = 0;
  bgCur = THEMES[0].bg.slice(); ceilCur = THEMES[0].ceil.slice();
  // 第 0 塊平台固定在腳下,其餘由種子生成
  plats.push(makePlat(W/2 - PLAT_W/2, 200, TYPES.NORMAL));
  nextPlatWY = 200; nextPlatIdx = 1;
  ensurePlats(H + 120);
  mpBoardEl.innerHTML = "";
  spectateBar.style.display = "none";
}

// ----- 輸入 -----
addEventListener("keydown", e => {
  if(e.target && e.target.tagName === "INPUT"){
    if(e.code === "Enter"){
      const btn = document.getElementById("enterBtn") || document.getElementById("joinBtn");
      if(btn) btn.click();
    }
    return;
  }
  if(state === "spectate"){
    if(e.code === "ArrowLeft" || e.code === "KeyA") switchSpectate(-1);
    if(e.code === "ArrowRight" || e.code === "KeyD") switchSpectate(1);
    return;
  }
  if(e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
  if(e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
  if(e.code === "Space" && state === "dead") startGame();
  if((e.code === "Escape" || e.code === "KeyP") && (state === "play" || state === "paused")) togglePause();
});
addEventListener("keyup", e => {
  if(e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
  if(e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
});
function bindPad(id, key, dir){
  const el = document.getElementById(id);
  const on = e => {
    e.preventDefault();
    if(state === "spectate"){ switchSpectate(dir); return; }
    keys[key] = true;
  };
  const off = e => { e.preventDefault(); keys[key] = false; };
  el.addEventListener("pointerdown", on);
  el.addEventListener("pointerup", off);
  el.addEventListener("pointerleave", off);
  el.addEventListener("pointercancel", off);
}
bindPad("leftPad","left",-1); bindPad("rightPad","right",1);
cvs.addEventListener("pointerdown", () => { if(state === "dead") startGame(); });
document.getElementById("pauseBtn").addEventListener("click", () => {
  if(gameMode === "multi"){ mpRequestPause(); }
  else if(state === "play" || state === "paused") togglePause();
});
document.getElementById("specPrev").addEventListener("click", () => switchSpectate(-1));
document.getElementById("specNext").addEventListener("click", () => switchSpectate(1));

// ----- 單人流程 -----
function startGame(){
  if(!playerName){ showMenu(); return; }
  reset("single");
  state = "play";
  overlay.classList.add("hidden");
  overlay.classList.remove("lite");
}
function togglePause(){
  if(state === "play"){
    state = "paused";
    keys.left = keys.right = false;
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<h1>暫停中</h1>' +
      '<p class="big">' + escapeHTML(playerName) + ' · 第 ' + floorCount + ' 層</p>' +
      '<p>休息一下,準備好再繼續!</p>' +
      '<button class="start" id="resumeBtn">繼續遊戲</button>' +
      '<button id="quitBtn" class="linkBtn">放棄這局,回到主選單</button>';
    document.getElementById("resumeBtn").addEventListener("click", togglePause);
    document.getElementById("quitBtn").addEventListener("click", () => {
      if(confirm("確定要放棄這局嗎?這局的成績不會被記錄。")) showMenu();
    });
  } else if(state === "paused"){
    state = "play";
    overlay.classList.add("hidden");
  }
}
function damage(n){
  if(invul > 0) return;
  hp = Math.max(0, hp - n);
  invul = 60; shake = 10;
  if(hp <= 0) die();
}
function heal(n){ hp = Math.min(MAX_HP, hp + n); }

function die(){
  if(gameMode === "multi"){ mpDie(); return; }
  state = "dead";
  overlay.classList.remove("hidden");
  overlay.innerHTML =
    '<h1>遊戲結束</h1>' +
    '<p class="big">' + escapeHTML(playerName) + ' 到達了第 ' + floorCount + ' 層!</p>' +
    '<p>' + praise(floorCount) + '</p>' +
    '<div id="boardArea"></div>' +

// ----- 更新(世界座標:wy 為世界深度,depth 為鏡頭位置) -----
function update(){
  time++;
  if(invul > 0) invul--;
  if(shake > 0) shake *= 0.85;
  if(player.squash > 0) player.squash *= 0.85;

  scrollSpeed = 1.4 + Math.min(2.2, floorCount * 0.022);

  player.vx = 0;
  if(keys.left){ player.vx = -MOVE_SPEED; player.face = -1; }
  if(keys.right){ player.vx = MOVE_SPEED; player.face = 1; }

  const p = player.onPlat;
  if(p){
    if(p.type === TYPES.BELT_L) player.vx -= 2.2;
    if(p.type === TYPES.BELT_R) player.vx += 2.2;
  }

  player.x += player.vx;
  player.x = Math.max(2, Math.min(W - player.w - 2, player.x));

  const g = GRAVITY * (1 + (scrollSpeed - 1.4) * 0.5);
  player.vy += g;
  const vyMax = 12 + (scrollSpeed - 1.4) * 2.5;
  if(player.vy > vyMax) player.vy = vyMax;
  const prevBottom = player.wy + player.h;
  player.wy += player.vy;

  depth += scrollSpeed;   // 鏡頭持續下移

  player.onPlat = null;
  for(const pl of plats){
    if(pl.broken) continue;
    const overX = player.x + player.w > pl.x + 4 && player.x < pl.x + pl.w - 4;
    const crossY = prevBottom <= pl.wy + 6 && player.wy + player.h >= pl.wy;
    if(player.vy >= 0 && overX && crossY){
      player.wy = pl.wy - player.h;
      player.vy = 0;
      player.onPlat = pl;
      if(!pl.landed){
        pl.landed = true;
        floorCount++;
      }
      player.squash = 1;
      switch(pl.type){
        case TYPES.NORMAL: heal(1); break;
        case TYPES.SPIKE: damage(3); break;
        case TYPES.FRAGILE: pl.breakT = 18; break;
        case TYPES.SPRING:
          player.vy = -10.5; pl.springT = 12; player.onPlat = null; break;
      }
      break;
    }
  }

  for(const pl of plats){
    if(pl.breakT > 0){
      pl.breakT--;
      if(pl.breakT === 0) pl.broken = true;
    }
    if(pl.springT > 0) pl.springT--;
    pl.beltPhase += 0.15;
  }

  // 天花板尖刺(以鏡頭為基準)
  if(player.wy - depth < CEIL_H){
    player.wy = depth + CEIL_H;
    player.vy = 2;
    damage(2);
  }

  // 掉出畫面
  if(player.wy - depth > H + 40) { hp = 0; die(); return; }

  plats = plats.filter(pl => pl.wy > depth - 80);
  ensurePlats(depth + H + 80);

  floorEl.textContent = playerName + " · 第 " + floorCount + " 層";
  renderHP();
}

// ----- 繪圖 -----
function renderHP(){
  let html = "";
  for(let i=0;i<MAX_HP;i++){
    const full = i < hp;
    html += '<svg class="heart" viewBox="0 0 16 16">' +
      '<path d="M8 14 L2 8 Q0 6 1.5 3.5 Q3 1.5 5.5 3 L8 5 L10.5 3 Q13 1.5 14.5 3.5 Q16 6 14 8 Z" ' +
      'fill="' + (full ? '#ff5d73' : 'rgba(255,255,255,.15)') + '"/></svg>';
  }
  hpEl.innerHTML = html;
}

function drawPlat(pl){
  if(pl.broken) return;
  const x = pl.x, w = pl.w, h = pl.h;
  const y = pl.wy - depth;
  if(y < -40 || y > H + 40) return;
  ctx.save();
  if(pl.breakT > 0) ctx.translate(rand(-2,2), rand(-1,1));

  switch(pl.type){
    case TYPES.NORMAL:
      ctx.fillStyle = "#7c4f2c";
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = "#a9713f";
      ctx.fillRect(x, y, w, 5);
      ctx.fillStyle = "#5d3a1f";
      for(let i=8;i<w;i+=22) ctx.fillRect(x+i, y+7, 3, h-9);
      break;
    case TYPES.SPIKE:
      ctx.fillStyle = "#5a5470";
      ctx.fillRect(x, y+8, w, h-8);
      ctx.fillStyle = "#cfd2e8";
      for(let i=0;i<w;i+=12){
        ctx.beginPath();
        ctx.moveTo(x+i, y+9);
        ctx.lineTo(x+i+6, y-6);
        ctx.lineTo(x+i+12, y+9);
        ctx.fill();
      }
      break;
    case TYPES.BELT_L:
    case TYPES.BELT_R: {
      ctx.fillStyle = "#2f6f6f";
      ctx.fillRect(x, y, w, h);
      const dir = pl.type === TYPES.BELT_R ? 1 : -1;
      const off = (pl.beltPhase * 6 * dir) % 18;
      for(let i=-18;i<w+18;i+=18){
        const ax = x + ((i + off) % (w+18) + (w+18)) % (w+18) - 9;
        if(ax > x+2 && ax < x+w-12){
          ctx.beginPath();
          ctx.moveTo(ax, y+4); ctx.lineTo(ax+8*dir, y+h/2); ctx.lineTo(ax, y+h-4);
          ctx.lineWidth = 3; ctx.strokeStyle = "#9be8e0"; ctx.stroke();
        }
      }
      break;
    }
    case TYPES.FRAGILE:
      ctx.fillStyle = pl.breakT > 0 ? "#e2a14b" : "#e8b15e";
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = "#8c5a16";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x+w*0.3, y); ctx.lineTo(x+w*0.42, y+h*0.6); ctx.lineTo(x+w*0.36, y+h);
      ctx.moveTo(x+w*0.68, y); ctx.lineTo(x+w*0.6, y+h*0.5); ctx.lineTo(x+w*0.72, y+h);
      ctx.stroke();
      break;
    case TYPES.SPRING: {
      const lift = pl.springT > 0 ? 4 : 0;
      ctx.fillStyle = "#444a66";
      ctx.fillRect(x, y+10, w, h-10);
      ctx.strokeStyle = "#c9cff0";
      ctx.lineWidth = 3;
      for(let i=10;i<w-10;i+=24){
        ctx.beginPath();
        ctx.moveTo(x+i, y+10);
        ctx.quadraticCurveTo(x+i+6, y-2-lift, x+i+12, y+10);
        ctx.stroke();
      }
      ctx.fillStyle = "#8f97c4";
      ctx.fillRect(x+4, y - lift, w-8, 5);
      break;
    }
  }
  ctx.restore();
}

function drawAccessory(g, c, face){
  const hx = 13;
  g.fillStyle = c.accColor; g.strokeStyle = c.accColor;
  switch(c.acc){
    case "bow": {
      const bx = hx - face*7, by = 0;
      g.beginPath();
      g.moveTo(bx, by); g.lineTo(bx-6, by-4); g.lineTo(bx-6, by+4); g.closePath();
      g.moveTo(bx, by); g.lineTo(bx+6, by-4); g.lineTo(bx+6, by+4); g.closePath();
      g.fill();
      g.beginPath(); g.arc(bx, by, 2, 0, Math.PI*2); g.fill();
      break;
    }
    case "cap":
      g.beginPath(); g.arc(hx, 6, 10.5, Math.PI, 0); g.fill();
      g.fillRect(face === 1 ? hx : hx-13, 3, 13, 4);
      break;
    case "crown":
      g.beginPath();
      g.moveTo(hx-8, 0); g.lineTo(hx-8, -8); g.lineTo(hx-4, -3);
      g.lineTo(hx, -9); g.lineTo(hx+4, -3); g.lineTo(hx+8, -8); g.lineTo(hx+8, 0);
      g.closePath(); g.fill();
      break;
    case "glasses": {
      g.lineWidth = 1.6;
      const ex = hx + face*3;
      g.beginPath(); g.arc(ex-3, 10, 4, 0, Math.PI*2); g.stroke();
      g.beginPath(); g.arc(ex+3, 10, 4, 0, Math.PI*2); g.stroke();
      g.beginPath(); g.moveTo(ex-1, 9); g.lineTo(ex+1, 9); g.stroke();
      break;
    }
    case "halo":
      g.lineWidth = 2.5;
      g.beginPath(); g.ellipse(hx, -6, 8, 2.6, 0, 0, Math.PI*2); g.stroke();
      break;
    case "horns":
      g.beginPath();
      g.moveTo(hx-6, 0); g.lineTo(hx-10, -8); g.lineTo(hx-3, -2); g.closePath();
      g.moveTo(hx+6, 0); g.lineTo(hx+10, -8); g.lineTo(hx+3, -2); g.closePath();
      g.fill();
      break;
    case "catears":
      g.beginPath();
      g.moveTo(hx-9, 2); g.lineTo(hx-7, -8); g.lineTo(hx-2, -1); g.closePath();
      g.moveTo(hx+9, 2); g.lineTo(hx+7, -8); g.lineTo(hx+2, -1); g.closePath();
      g.fill();
      g.fillStyle = "#ffb4a2";
      g.beginPath();
      g.moveTo(hx-7.5, 0); g.lineTo(hx-6.8, -5); g.lineTo(hx-4, -1); g.closePath();
      g.moveTo(hx+7.5, 0); g.lineTo(hx+6.8, -5); g.lineTo(hx+4, -1); g.closePath();
      g.fill();
      break;
    case "antenna":
      g.lineWidth = 2;
      g.beginPath(); g.moveTo(hx, -1); g.lineTo(hx, -8); g.stroke();
      g.beginPath(); g.arc(hx, -9, 2.6, 0, Math.PI*2); g.fill();
      break;
    case "ninja":
      g.fillRect(hx-10, 3, 20, 4);
      g.fillRect(hx - face*10 - (face === 1 ? 4 : 0), 4, 4, 7);
      break;
    case "headband":
      g.fillRect(hx-10, 3.5, 20, 3.5);
      break;
    case "flower": {
      const fx = hx - face*7, fy = 1;
      for(let i=0;i<5;i++){
        const a = i/5 * Math.PI*2;
        g.beginPath(); g.arc(fx + Math.cos(a)*3, fy + Math.sin(a)*3, 2, 0, Math.PI*2); g.fill();
      }
      g.fillStyle = "#ffd700";
      g.beginPath(); g.arc(fx, fy, 2, 0, Math.PI*2); g.fill();
      break;
    }
    case "chef":
      g.fillRect(hx-6, -7, 12, 7);
      g.beginPath();
      g.arc(hx-4, -7, 3, 0, Math.PI*2);
      g.arc(hx, -8.5, 3.4, 0, Math.PI*2);
      g.arc(hx+4, -7, 3, 0, Math.PI*2);
      g.fill();
      break;
    case "pirate": {
      g.beginPath(); g.arc(hx, 6, 10.5, Math.PI, 0); g.fill();
      const ex = hx + face*3;
      g.lineWidth = 1.5;
      g.beginPath(); g.moveTo(hx-10, 8.5); g.lineTo(hx+10, 6); g.stroke();
      g.beginPath(); g.arc(ex+3, 10, 3, 0, Math.PI*2); g.fill();
      break;
    }
    case "sprout":
      g.lineWidth = 2;
      g.beginPath(); g.moveTo(hx, -1); g.lineTo(hx, -6); g.stroke();
      g.beginPath(); g.ellipse(hx-3.5, -7, 3.5, 2, -0.5, 0, Math.PI*2); g.fill();
      g.beginPath(); g.ellipse(hx+3.5, -7, 3.5, 2, 0.5, 0, Math.PI*2); g.fill();
      break;
  }
}
function renderChar(g, c, face, step){
  const w = 26, h = 30;
  g.fillStyle = c.body;
  roundRectG(g, 0, 8, w, h-8, 6); g.fill();
  g.fillStyle = c.skin;
  g.beginPath(); g.arc(w/2, 9, 10, 0, Math.PI*2); g.fill();
  g.fillStyle = c.hair;
  g.beginPath(); g.arc(w/2, 6, 10, Math.PI, 0); g.fill();
  g.fillStyle = "#222";
  const ex = w/2 + face*3;
  g.beginPath(); g.arc(ex-3, 10, 1.6, 0, Math.PI*2); g.arc(ex+3, 10, 1.6, 0, Math.PI*2); g.fill();
  g.fillStyle = c.shoe;
  g.fillRect(4, h-4+step*0.5, 7, 4);
  g.fillRect(w-11, h-4-step*0.5, 7, 4);
  drawAccessory(g, c, face);
}
function drawPlayer(){
  if(invul > 0 && Math.floor(time/4) % 2 === 0) return;
  const sq = player.squash;
  const px = player.x, py = player.wy - depth, w = player.w, h = player.h;
  ctx.save();
  ctx.translate(px + w/2, py + h);
  ctx.scale(1 + sq*0.25, 1 - sq*0.25);
  ctx.translate(-w/2, -h);
  const step = player.vx !== 0 ? Math.sin(time*0.4)*3 : 0;
  renderChar(ctx, CHARS[selectedChar], player.face, step);
  ctx.restore();
}
function roundRectG(g, x,y,w,h,r){
  g.beginPath();
  g.moveTo(x+r,y);
  g.arcTo(x+w,y,x+w,y+h,r);
  g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r);
  g.arcTo(x,y,x+w,y,r);
  g.closePath();
}
function charIcon(c, scale){
  const cv = document.createElement("canvas");
  const s = scale || 1.25;
  cv.width = Math.round(26*s) + 14;
  cv.height = Math.round(30*s) + 14;
  const g = cv.getContext("2d");
  g.translate((cv.width - 26*s)/2, (cv.height - 30*s)/2 + 3);
  g.scale(s, s);
  renderChar(g, c, 1, 0);
  return cv;
}
// 通用角色格子:opts = { selected:fn, onPick:fn(i), claims:{idx:pid} (多人時鎖定), myPid }
function buildCharGrid(grid, opts){
  if(!grid) return;
  grid.innerHTML = "";
  const claims = opts.claims || null;
  CHARS.forEach((c, i) => {
    const cell = document.createElement("button");
    const claimedBy = claims ? claims[i] : null;
    const takenByOther = claimedBy && claimedBy !== opts.myPid;
    let cls = "charCell";
    if(opts.selected() === i && !takenByOther) cls += " sel";
    if(takenByOther) cls += " taken";
    cell.className = cls;
    cell.appendChild(charIcon(c, 1.25));
    const label = document.createElement("span");
    label.textContent = takenByOther && opts.names && opts.names[claimedBy]
      ? opts.names[claimedBy] : c.name;
    cell.appendChild(label);
    cell.addEventListener("click", () => {
      if(takenByOther) return;
      opts.onPick(i);
      if(!claims){ // 單人:本地重繪選取狀態
        grid.querySelectorAll(".charCell").forEach((el, j) =>
          el.classList.toggle("sel", j === opts.selected()));
      }
    });
    grid.appendChild(cell);
  });
}

];
let bgCur = THEMES[0].bg.slice(), ceilCur = THEMES[0].ceil.slice();
let lastThemeIdx = 0, themeMsg = "", themeMsgT = 0;
function viewFloor(){
  if(state === "spectate" && mp && mp.specTarget && mp.players[mp.specTarget])
    return mp.players[mp.specTarget].floor || 0;
  return floorCount;
}
function currentTheme(){
  return THEMES[Math.floor(viewFloor() / THEME_EVERY) % THEMES.length];
}
const rgb = c => "rgb(" + (c[0]|0) + "," + (c[1]|0) + "," + (c[2]|0) + ")";
function drawPattern(type){
  const off = depth % 48;
  switch(type){
    case "brick":
      ctx.fillStyle = "rgba(255,255,255,.03)";
      for(let y=-off; y<H; y+=48)
        for(let x = (Math.floor((y+depth)/48)%2)*40 - 40; x<W; x+=80)
          ctx.fillRect(x, y, 76, 44);
      break;
    case "stone":
      ctx.fillStyle = "rgba(255,255,255,.045)";
      for(let y=-off; y<H+48; y+=48)
        for(let x = (Math.floor((y+depth)/48)%2)*30; x<W+40; x+=60){
          ctx.beginPath();
          ctx.ellipse(x, y, 24, 17, 0, 0, Math.PI*2);
          ctx.fill();
        }
      break;
    case "ice":
      ctx.strokeStyle = "rgba(200,235,255,.08)";
      ctx.lineWidth = 2;
      for(let y=-off; y<H+48; y+=48)
        for(let x = (Math.floor((y+depth)/48)%2)*24; x<W+48; x+=48){
          ctx.beginPath();
          ctx.moveTo(x, y-16); ctx.lineTo(x+16, y);
          ctx.lineTo(x, y+16); ctx.lineTo(x-16, y);
          ctx.closePath(); ctx.stroke();
        }
      break;
    case "lava":
      for(let y=-off; y<H+48; y+=48)
        for(let x = (Math.floor((y+depth)/48)%2)*36 + 18; x<W+40; x+=72){
          const pulse = 0.05 + 0.04 * Math.sin(time*0.05 + x + y*0.1);
          ctx.fillStyle = "rgba(255,120,40," + pulse.toFixed(3) + ")";
          ctx.beginPath();
          ctx.arc(x, y, 14, 0, Math.PI*2);
          ctx.fill();
        }
      break;
    case "metal":
      ctx.strokeStyle = "rgba(255,255,255,.04)";
      ctx.lineWidth = 10;
      for(let x=-H-off; x<W+H; x+=56){
        ctx.beginPath();
        ctx.moveTo(x, -10); ctx.lineTo(x+H+20, H+10);
        ctx.stroke();
      }
      ctx.fillStyle = "rgba(255,255,255,.07)";
      for(let y=-off; y<H+48; y+=48)
        for(let x = (Math.floor((y+depth)/48)%2)*32 + 16; x<W; x+=64){
          ctx.beginPath();
          ctx.arc(x, y, 3, 0, Math.PI*2);
          ctx.fill();
        }
      break;
  }
}

function drawGhosts(){
  if(gameMode !== "multi" || !mp) return;
  ctx.save();
  ctx.font = "bold 11px 'Microsoft JhengHei', sans-serif";
  ctx.textAlign = "center";
  for(const pid in mp.ghostPos){
    if(pid === mp.myId) continue;
    const pdata = mp.players[pid];
    if(!pdata) continue;
    const gp = mp.ghostPos[pid];
    const isSpecTarget = state === "spectate" && pid === mp.specTarget;
    const sy = gp.wy - depth;
    if(pdata.alive === false && !gp.tombT) gp.tombT = 90;
    if(gp.tombT){
      gp.tombT--;
      if(sy > -40 && sy < H + 40 && gp.tombT > 0){
        ctx.globalAlpha = Math.min(1, gp.tombT / 45);
        ctx.fillStyle = "#9aa0b5";
        roundRectG(ctx, gp.x + 3, sy + 8, 20, 22, 6); ctx.fill();
        ctx.fillRect(gp.x + 9, sy + 28, 8, 4);
        ctx.fillStyle = "#5b6070";
        ctx.fillText("✝", gp.x + 13, sy + 23);
        ctx.globalAlpha = 1;
      }
      continue;
    }
    if(sy > -40 && sy < H + 40){
      ctx.save();
      ctx.globalAlpha = isSpecTarget ? 1 : 0.5;
      ctx.translate(gp.x, sy);
      renderChar(ctx, CHARS[pdata.char || 0], 1, 0);
      ctx.restore();
      ctx.fillStyle = isSpecTarget ? "#ffc83d" : "rgba(255,255,255,.85)";
      ctx.strokeStyle = "rgba(0,0,0,.6)"; ctx.lineWidth = 3;
      ctx.strokeText(pdata.name || "", gp.x + 13, sy - 6);
      ctx.fillText(pdata.name || "", gp.x + 13, sy - 6);
    } else {
      // 視野外指示器
      const above = sy <= -40;
      const iy = above ? CEIL_H + 26 : H - 14;
      ctx.fillStyle = "rgba(255,255,255,.75)";
      ctx.strokeStyle = "rgba(0,0,0,.6)"; ctx.lineWidth = 3;
      const txt = (above ? "▲ " : "▼ ") + (pdata.name || "") + " " + (pdata.floor || 0);
      ctx.strokeText(txt, W - 60, iy);
      ctx.fillText(txt, W - 60, iy);
    }
  }
  ctx.restore();
}

function draw(){
  const th = currentTheme();
  for(let i=0;i<3;i++){
    bgCur[i]   += (th.bg[i]   - bgCur[i])   * 0.04;
    ceilCur[i] += (th.ceil[i] - ceilCur[i]) * 0.04;
  }
  const idx = Math.floor(viewFloor() / THEME_EVERY) % THEMES.length;
  if(state === "play" && idx !== lastThemeIdx){
    lastThemeIdx = idx;
    themeMsg = "進入 " + th.name;
    themeMsgT = 130;
  }

  ctx.save();
  if(shake > 0.5) ctx.translate(rand(-shake,shake), rand(-shake,shake));

  ctx.fillStyle = rgb(bgCur);
  ctx.fillRect(-10,-10,W+20,H+20);
  drawPattern(th.pattern);

  for(const pl of plats) drawPlat(pl);
  drawGhosts();
  if(state !== "spectate") drawPlayer();

  ctx.fillStyle = rgb(ceilCur);
  ctx.fillRect(-10, -10, W+20, CEIL_H-8);
  ctx.fillStyle = "#cfd2e8";
  for(let i=0;i<W;i+=16){
    ctx.beginPath();
    ctx.moveTo(i, CEIL_H-9);
    ctx.lineTo(i+8, CEIL_H+8);
    ctx.lineTo(i+16, CEIL_H-9);
    ctx.fill();
  }

  if(themeMsgT > 0){
    themeMsgT--;
    const a = Math.min(1, themeMsgT / 40);
    ctx.globalAlpha = a;
    ctx.font = "bold 26px 'Microsoft JhengHei', sans-serif";
    ctx.textAlign = "center";
    ctx.fillStyle = "#ffc83d";
    ctx.strokeStyle = "rgba(0,0,0,.6)";
    ctx.lineWidth = 5;
    ctx.strokeText(themeMsg, W/2, 130);
    ctx.fillText(themeMsg, W/2, 130);
    ctx.globalAlpha = 1;
    ctx.textAlign = "left";
  }
  ctx.restore();
}

let fdb = null, serverOffset = 0;
let mp = null;   // 房間狀態

function fbReady(){
  if(fdb) return true;
  if(!FIREBASE_CONFIG || typeof firebase === "undefined") return false;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    fdb = firebase.database();
    fdb.ref(".info/serverTimeOffset").on("value", s => { serverOffset = s.val() || 0; });
    return true;
  }catch(e){ console.error(e); return false; }
}
const sNow = () => Date.now() + serverOffset;
function myPid(){
  let id = storeGet(PID_KEY);
  if(!id){ id = "p" + Math.random().toString(36).slice(2, 10); storeSet(PID_KEY, id); }
  return id;
}
const roomCodeGen = () => String(Math.floor(1000 + Math.random()*9000));

// ----- 多人入口頁 -----
function showMpEntry(){
  state = "menu";
  mpLeaveRoom();
  overlay.classList.remove("hidden");
  overlay.innerHTML =
    '<h1>多人模式</h1>' +
    '<button class="modeBtn" id="createBtn" style="background:#1D9E75;">🏠 建立房間<small>產生房號,邀請朋友加入</small></button>' +
    '<div style="display:flex;gap:8px;align-items:center;">' +
      '<input class="txtInput" id="codeInput" maxlength="4" inputmode="numeric" placeholder="輸入 4 位房號" style="width:170px;">' +
      '<button class="start" id="joinBtn" style="margin-top:0;padding:11px 22px;">加入</button>' +
    '</div>' +
    '<p class="errMsg" id="mpErr"></p>' +
    '<button class="modeBtn" id="quickBtn" style="background:#D85A30;">⚡ 快速配對<small>自動加入公開房間</small></button>' +
    '<button id="backBtn" class="linkBtn">← 返回模式選擇</button>';
  document.getElementById("createBtn").addEventListener("click", () => mpCreateRoom(false));
  document.getElementById("joinBtn").addEventListener("click", () => {
    const code = document.getElementById("codeInput").value.trim();
    if(!/^\d{4}$/.test(code)){
      document.getElementById("mpErr").textContent = "房號是 4 位數字喔!";
      return;
    }
    mpJoinRoom(code);
  });
  document.getElementById("quickBtn").addEventListener("click", mpQuickMatch);
  document.getElementById("backBtn").addEventListener("click", () => showModeSelect());
}
function mpError(msg){
  const el = document.getElementById("mpErr");
  if(el) el.textContent = msg; else alert(msg);
}

// ----- 建房 / 加房 / 快配 -----
async function mpCreateRoom(isPublic){
  const code = roomCodeGen();
  const ref = fdb.ref("rooms/" + code);
  const snap = await ref.child("status").once("value");
  if(snap.exists()){ mpCreateRoom(isPublic); return; }  // 撞號重抽
  await ref.set({
    status: "waiting",
    public: !!isPublic,
    open: !!isPublic,
    createdAt: firebase.database.ServerValue.TIMESTAMP
  });
  mpEnterRoom(code);
}
async function mpJoinRoom(code){
  const ref = fdb.ref("rooms/" + code);
  const snap = await ref.once("value");
  const room = snap.val();
  if(!room){ mpError("找不到這個房間,確認房號再試一次。"); return; }
  if(room.status === "playing" || room.status === "ended"){
    mpError("這場遊戲已經開始了,等下一場吧!"); return;
  }
  const count = room.players ? Object.keys(room.players).length : 0;
  if(count >= 8){ mpError("房間已滿(8 人上限)。"); return; }
  mpEnterRoom(code);
}
async function mpQuickMatch(){
  mpError("正在尋找公開房間…");
  try{
    const snap = await fdb.ref("rooms").orderByChild("open").equalTo(true).limitToFirst(10).once("value");
    let target = null;
    snap.forEach(child => {
      const r = child.val();
      const count = r.players ? Object.keys(r.players).length : 0;
      if(!target && (r.status === "waiting" || r.status === "countdown") && count < 8){
        target = child.key;
      }
    });
    if(target) mpEnterRoom(target);
    else mpCreateRoom(true);   // 沒有可加入的公開房,自己開一間
  }catch(e){
    console.error(e);
    mpError("配對失敗,請稍後再試。");
  }
}

// ----- 進房與大廳 -----
function mpEnterRoom(code){
  gameMode = "multi";
  const id = myPid();
  mp = {
    code, myId: id,
    ref: fdb.ref("rooms/" + code),
    players: {}, claims: {}, results: {},
    status: "waiting", seed: null, startAt: 0, isPublic: false,
    pause: null, resumeAt: 0,
    ghostPos: {}, lastKnown: {},
    specTarget: null, myReady: false, started: false,
    pubTimer: null, subs: []
  };
  const meRef = mp.ref.child("players/" + id);
  meRef.set({
    name: playerName, char: -1, ready: false, alive: true,
    floor: 0, x: W/2, wy: 140, depth: 0,
    joinedAt: firebase.database.ServerValue.TIMESTAMP
  });
  meRef.onDisconnect().remove();
  // 訂閱房間
  const sub = (path, cb) => {
    const r = path ? mp.ref.child(path) : mp.ref;
    r.on("value", cb);
    mp.subs.push(() => r.off("value", cb));
  };
  sub("players", s => { if(mp){ mpOnPlayers(s.val() || {}); } });
  sub("claims",  s => { if(mp){ mp.claims = s.val() || {}; if(state === "menu") renderLobby(); } });
  sub("results", s => { if(mp){ mp.results = s.val() || {}; } });
  const stRef = mp.ref.child("status");
  const stCb = s => { if(mp) mpOnStatus(s.val()); };
  stRef.on("value", stCb); mp.subs.push(() => stRef.off("value", stCb));
  const seedRef = mp.ref.child("seed");
  const seedCb = s => { if(mp) mp.seed = s.val(); };
  seedRef.on("value", seedCb); mp.subs.push(() => seedRef.off("value", seedCb));
  const saRef = mp.ref.child("startAt");
  const saCb = s => { if(mp) mp.startAt = s.val() || 0; };
  saRef.on("value", saCb); mp.subs.push(() => saRef.off("value", saCb));
  const pbRef = mp.ref.child("public");
  const pbCb = s => { if(mp) mp.isPublic = !!s.val(); };
  pbRef.on("value", pbCb); mp.subs.push(() => pbRef.off("value", pbCb));
  const paRef = mp.ref.child("pause");
  const paCb = s => { if(mp) mpOnPause(s.val()); };
  paRef.on("value", paCb); mp.subs.push(() => paRef.off("value", paCb));
  const raRef = mp.ref.child("resumeAt");
  const raCb = s => { if(mp) mpOnResumeAt(s.val() || 0); };
  raRef.on("value", raCb); mp.subs.push(() => raRef.off("value", raCb));
  renderLobby();
}
function mpLeaveRoom(){
  if(!mp) return;
  const m = mp; mp = null;
  m.subs.forEach(off => { try{ off(); }catch(e){} });
  if(m.pubTimer) clearInterval(m.pubTimer);
  const myChar = Object.keys(m.claims).find(i => m.claims[i] === m.myId);
  if(myChar !== undefined) m.ref.child("claims/" + myChar).remove();
  m.ref.child("players/" + m.myId).remove();
  // 自己是最後一人就順手收掉房間
  setTimeout(async () => {
    try{
      const s = await m.ref.child("players").once("value");
      if(!s.exists()) m.ref.remove();
    }catch(e){}
  }, 500);
  gameMode = "single";
  mpBoardEl.innerHTML = "";
  spectateBar.style.display = "none";
}
function mpIsHost(){
  if(!mp) return false;
  let host = null, minJoin = Infinity;
  for(const pid in mp.players){
    const j = mp.players[pid].joinedAt || 0;
    if(j < minJoin){ minJoin = j; host = pid; }
  }
  return host === mp.myId;
}
function mpOnPlayers(players){
  // 紀錄最後已知資料(斷線者也能進排名)
  for(const pid in players){
    mp.lastKnown[pid] = Object.assign({}, mp.lastKnown[pid], players[pid]);
    if(!mp.ghostPos[pid]) mp.ghostPos[pid] = { x: players[pid].x || 0, wy: players[pid].wy || 0, tombT: 0 };
  }
  mp.players = players;
  if(state === "menu") renderLobby();
  // 公開房自動開賽規則(由房主執行)
  if(mp.status === "waiting" && mp.isPublic && mpIsHost()){
    const list = Object.values(players);
    if(list.length >= 2 && list.every(p => p.ready && p.char >= 0)){
      mpHostStart(list.length >= 8 ? 3500 : 10000);
    }
  }
  // 倒數期間有新人加入 → 公開房重置倒數
  if(mp.status === "countdown" && mp.isPublic && mpIsHost()){
    const n = Object.keys(players).length;
    if(mp.lastCount && n > mp.lastCount){
      mp.ref.update({ startAt: sNow() + 10000 });
    }
    mp.lastCount = n;
  } else {
    mp.lastCount = Object.keys(players).length;
  }
  // 對戰中:檢查是否全員結束
  if(mp.started && (state === "play" || state === "spectate" || state === "mppause")){
    mpCheckMatchEnd();
  }
  // 觀戰目標若死亡或離開,換下一位
  if(state === "spectate"){
    const t = mp.players[mp.specTarget];
    if(!t || t.alive === false) pickSpectateTarget();
    updateSpectateMsg();
  }
}
function mpOnStatus(status){
  const prev = mp.status;
  mp.status = status;
  if(status === "countdown" && !mp.started){
    mpBeginCountdown();
  }
  if(status === "waiting" && prev && prev !== "waiting"){
    // 再來一場:回到大廳
    mp.started = false;
    if(mp.pubTimer){ clearInterval(mp.pubTimer); mp.pubTimer = null; }
    mp.ref.child("players/" + mp.myId).update({ ready: false, alive: true, floor: 0 });
    mp.ghostPos = {}; mp.results = {};
    state = "menu";
    spectateBar.style.display = "none";
    mpBoardEl.innerHTML = "";
    renderLobby();
  }
}

// ----- 大廳畫面 -----
function renderLobby(){
  if(!mp || state !== "menu") return;
  if(!document.getElementById("lobbyBox")){
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<div id="lobbyBox" style="display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;">' +
      '</div>';
  }
  const box = document.getElementById("lobbyBox");
  if(!box) return;
  const players = mp.players || {};
  const pids = Object.keys(players).sort((a,b) => (players[a].joinedAt||0) - (players[b].joinedAt||0));
  const names = {}; pids.forEach(pid => names[pid] = players[pid].name);
  const me = players[mp.myId] || {};
  const isHost = mpIsHost();
  const allReady = pids.length > 0 && pids.every(pid => players[pid].ready && players[pid].char >= 0);

  let listHtml = "";
  pids.forEach(pid => {
    const p = players[pid];
    listHtml += '<div class="lobbyRow" data-pid="' + pid + '">' +
      '<span class="iconSlot" data-char="' + (p.char ?? -1) + '"></span>' +
      '<span class="nm">' + escapeHTML(p.name || "?") + (pid === mp.myId ? "(你)" : "") + '</span>' +
      (p.ready ? '<span class="rdy">✔ 已準備</span>' : '<span class="wait">選角色中…</span>') +
      '</div>';
  });

  box.innerHTML =
    '<h1 style="font-size:26px;">' + (mp.isPublic ? "公開房間" : "房間大廳") + '</h1>' +
    '<div class="roomCode">' + mp.code + '</div>' +
    '<p style="font-size:13px;opacity:.7;margin:0;">' +
      (mp.isPublic ? "公開配對房・至少 2 人且全員準備後自動開賽" : "把房號告訴朋友,他們輸入就能加入") +
    '</p>' +
    '<div class="lobbyList">' + (listHtml || '<p style="opacity:.6;font-size:13px;">等待玩家加入…</p>') + '</div>' +
    '<p style="margin:2px 0 0;font-size:14px;opacity:.85;">選擇你的角色(先搶先贏,不能重複)</p>' +
    '<div id="charGrid"></div>' +
    '<button class="start" id="readyBtn">' + (me.ready ? "取消準備" : "我準備好了") + '</button>' +
    (!mp.isPublic && isHost
      ? '<button class="start alt" id="hostStartBtn"' + (allReady && pids.length >= 1 ? "" : " disabled") + '>開始遊戲</button>'
      : "") +
    (!mp.isPublic && !isHost ? '<p style="font-size:13px;opacity:.6;">等待房主開始遊戲…</p>' : "") +
    '<button id="leaveBtn" class="linkBtn">離開房間</button>';

  // 畫成員頭像
  box.querySelectorAll(".iconSlot").forEach(slot => {
    const ci = parseInt(slot.getAttribute("data-char"));
    if(ci >= 0) slot.appendChild(charIcon(CHARS[ci], 0.9));
    else slot.textContent = "❓";
  });
  buildCharGrid(document.getElementById("charGrid"), {
    selected: () => (players[mp.myId] ? players[mp.myId].char : -1),
    claims: mp.claims, names, myPid: mp.myId,
    onPick: i => mpClaimChar(i)
  });
  document.getElementById("readyBtn").addEventListener("click", () => {
    const cur = mp.players[mp.myId] || {};
    if(!cur.ready && (cur.char === undefined || cur.char < 0)){
      alert("先選一個角色再準備喔!");
      return;
    }
    mp.ref.child("players/" + mp.myId + "/ready").set(!cur.ready);
  });
  const hostBtn = document.getElementById("hostStartBtn");
  if(hostBtn) hostBtn.addEventListener("click", () => mpHostStart(3500));
  document.getElementById("leaveBtn").addEventListener("click", () => { mpLeaveRoom(); showMpEntry(); });
}
async function mpClaimChar(i){
  const claimRef = mp.ref.child("claims/" + i);
  const res = await claimRef.transaction(cur => {
    if(cur === null || cur === mp.myId) return mp.myId;
    return; // 已被別人佔走,放棄
  });
  if(res.committed && res.snapshot.val() === mp.myId){
    // 釋放我原本佔的其他角色
    for(const k in mp.claims){
      if(mp.claims[k] === mp.myId && parseInt(k) !== i){
        mp.ref.child("claims/" + k).remove();
      }
    }
    claimRef.onDisconnect().remove();
    mp.ref.child("players/" + mp.myId).update({ char: i });
    storeSet(CHAR_KEY, String(i));
  }
}
function mpHostStart(delayMs){
  if(!mpIsHost() || !mp || mp.status !== "waiting") return;
  mp.ref.update({
    status: "countdown",
    seed: Math.floor(Math.random()*2147483647),
    startAt: sNow() + delayMs,
    open: false
  });
}

// ----- 開賽倒數與比賽中 -----
function mpBeginCountdown(){
  mp.started = true;
  state = "mpcount";
  selectedChar = (mp.players[mp.myId] && mp.players[mp.myId].char >= 0) ? mp.players[mp.myId].char : selectedChar;
  const waitSeed = () => {
    if(mp.seed === null || mp.seed === undefined){ setTimeout(waitSeed, 80); return; }
    reset("multi", mp.seed);
    overlay.classList.remove("hidden");
    overlay.classList.add("lite");
    const tick = () => {
      if(!mp || state !== "mpcount") return;
      const remain = mp.startAt - sNow();
      if(remain <= 0){
        overlay.classList.add("hidden");
        overlay.classList.remove("lite");
        state = "play";
        if(mpIsHost()) mp.ref.update({ status: "playing" });
        mpStartPublishing();
        return;
      }
      const sec = Math.ceil(remain/1000);
      overlay.innerHTML = '<h1 class="huge">' + (sec <= 3 ? sec : "準備") + '</h1>' +
        (sec > 3 ? '<p>等待開賽…' + sec + ' 秒</p>' : "");
      requestAnimationFrame(tick);
    };
    tick();
  };
  waitSeed();
}
function mpStartPublishing(){
  if(!mp || mp.pubTimer) return;
  mp.pubTimer = setInterval(() => {
    if(!mp) return;
    if(state === "play" || state === "mppause"){
      mp.ref.child("players/" + mp.myId).update({
        x: Math.round(player.x), wy: Math.round(player.wy),
        depth: Math.round(depth), floor: floorCount, alive: true
      });
    }
    mpRenderBoard();
    mpSmoothGhosts();
  }, 250);
}
function mpSmoothGhosts(){
  if(!mp) return;
  for(const pid in mp.players){
    if(pid === mp.myId) continue;
    const p = mp.players[pid];
    if(!mp.ghostPos[pid]) mp.ghostPos[pid] = { x: p.x || 0, wy: p.wy || 0, tombT: 0 };
  }
}
// 幽靈每幀朝最新位置平滑移動(在 draw 前呼叫)
function lerpGhosts(){
  if(!mp) return;
  for(const pid in mp.ghostPos){
    const p = mp.players[pid];
    if(!p) continue;
    const gp = mp.ghostPos[pid];
    gp.x += ((p.x || 0) - gp.x) * 0.18;
    gp.wy += ((p.wy || 0) - gp.wy) * 0.18;
  }
}
function mpRenderBoard(){
  if(!mp || !mp.started){ mpBoardEl.innerHTML = ""; return; }
  const rows = Object.keys(mp.players).map(pid => {
    const p = mp.players[pid];
    return { pid, name: p.name, floor: p.floor || 0, alive: p.alive !== false };
  }).sort((a,b) => b.floor - a.floor);
  mpBoardEl.innerHTML = rows.map(r =>
    '<div class="' + (r.pid === mp.myId ? "me" : "") + '">' +
    (r.alive ? "🟢 " : "💀 ") + escapeHTML(r.name) + " " + r.floor + "層</div>"
  ).join("");
}

// ----- 全員暫停 -----
function mpRequestPause(){
  if(!mp || state !== "play") return;
  mp.ref.child("pause").set({
    by: mp.myId, byName: playerName,
    until: sNow() + 60000
  });
}
function mpOnPause(pause){
  mp.pause = pause;
  if(pause && (state === "play" || state === "mppause")){
    state = "mppause";
    keys.left = keys.right = false;
    const render = () => {
      if(!mp || state !== "mppause" || !mp.pause) return;
      const remain = Math.max(0, Math.ceil((mp.pause.until - sNow())/1000));
      overlay.classList.remove("hidden");
      overlay.classList.add("lite");
      overlay.innerHTML =
        '<h1>⏸ 全員暫停</h1>' +
        '<p class="big">' + escapeHTML(mp.pause.byName || "?") + ' 暫停了遊戲</p>' +
        '<p>剩餘 ' + remain + ' 秒自動繼續</p>' +
        (mp.pause.by === mp.myId
          ? '<button class="start" id="mpResumeBtn">繼續遊戲</button>'
          : '<p style="font-size:13px;opacity:.6;">等待 ' + escapeHTML(mp.pause.byName || "?") + ' 繼續…</p>');
      const btn = document.getElementById("mpResumeBtn");
      if(btn) btn.addEventListener("click", mpResume);
      // 時間到 / 暫停者斷線 → 任何人都可觸發恢復
      if(remain <= 0 || !mp.players[mp.pause.by]) mpResume();
      else setTimeout(render, 300);
    };
    render();
  }
  if(!pause && state === "mppause" && !(mp.resumeAt > sNow())){
    // pause 被清掉且沒有恢復倒數(保險)
    state = "play";
    overlay.classList.add("hidden");
    overlay.classList.remove("lite");
  }
}
function mpResume(){
  if(!mp) return;
  mp.ref.update({ pause: null, resumeAt: sNow() + 3200 });
}
function mpOnResumeAt(resumeAt){
  mp.resumeAt = resumeAt;
  if(resumeAt > sNow() && state === "mppause"){
    const tick = () => {
      if(!mp || state !== "mppause") return;
      const remain = mp.resumeAt - sNow();
      if(remain <= 0){
        state = "play";
        overlay.classList.add("hidden");
        overlay.classList.remove("lite");
        return;
      }
      overlay.classList.remove("hidden");
      overlay.classList.add("lite");
      overlay.innerHTML = '<h1 class="huge">' + Math.ceil(remain/1000) + '</h1>';
      requestAnimationFrame(tick);
    };
    tick();
  }
}

// ----- 多人:死亡 → 觀戰 → 本場排名 -----
function mpDie(){
  if(!mp) return;
  mp.ref.child("players/" + mp.myId).update({ alive: false, floor: floorCount });
  mp.ref.child("results/" + mp.myId).set({
    name: playerName, char: selectedChar, floor: floorCount,
    t: firebase.database.ServerValue.TIMESTAMP
  });
  submitScore(playerName, floorCount, "多人");
  state = "spectate";
  pickSpectateTarget();
  if(mp.specTarget){
    spectateBar.style.display = "flex";
    updateSpectateMsg();
  }
  mpCheckMatchEnd();
}
function aliveOthers(){
  if(!mp) return [];
  return Object.keys(mp.players).filter(pid =>
    pid !== mp.myId && mp.players[pid].alive !== false);
}
function pickSpectateTarget(){
  const alive = aliveOthers().sort((a,b) =>
    (mp.players[b].floor || 0) - (mp.players[a].floor || 0));
  mp.specTarget = alive[0] || null;
}
function switchSpectate(dir){
  if(state !== "spectate" || !mp) return;
  const alive = aliveOthers().sort((a,b) =>
    (mp.players[b].floor || 0) - (mp.players[a].floor || 0));
  if(alive.length === 0) return;
  let i = alive.indexOf(mp.specTarget);
  i = (i + dir + alive.length) % alive.length;
  mp.specTarget = alive[i];
  updateSpectateMsg();
}
function updateSpectateMsg(){
  if(!mp || !mp.specTarget || !mp.players[mp.specTarget]) return;
  const t = mp.players[mp.specTarget];
  specMsg.textContent = "你在第 " + floorCount + " 層陣亡 · 觀戰中:" + (t.name || "?");
}
function spectateUpdate(){
  time++;
  if(!mp) return;
  const t = mp.players[mp.specTarget];
  if(!t){ pickSpectateTarget(); return; }
  // 鏡頭平滑跟隨觀戰目標
  const targetDepth = t.depth || 0;
  depth += (targetDepth - depth) * 0.12;
  ensurePlats(depth + H + 200);
  plats = plats.filter(pl => pl.wy > depth - 120);
  for(const pl of plats) pl.beltPhase += 0.15;
  floorEl.textContent = "👁 " + (t.name || "?") + " · 第 " + (t.floor || 0) + " 層";
}
function mpCheckMatchEnd(){
  if(!mp || !mp.started) return;
  const anyAlive = Object.values(mp.players).some(p => p.alive !== false);
  if(!anyAlive && Object.keys(mp.players).length > 0){
    showMatchResults();
  }
}
function showMatchResults(){
  if(!mp || state === "mpend") return;
  state = "mpend";
  spectateBar.style.display = "none";
  if(mp.pubTimer){ clearInterval(mp.pubTimer); mp.pubTimer = null; }
  // 排名 = 正式成績 + 斷線者的最後已知資料
  const entries = {};
  for(const pid in mp.results){
    const r = mp.results[pid];
    entries[pid] = { name: r.name, floor: r.floor || 0, t: r.t || 0 };
  }
  for(const pid in mp.lastKnown){
    if(!entries[pid]){
      const k = mp.lastKnown[pid];
      entries[pid] = { name: k.name || "?", floor: k.floor || 0, t: 9e15 };
    }
  }
  const ranked = Object.keys(entries).map(pid => Object.assign({pid}, entries[pid]))
    .sort((a,b) => b.floor - a.floor || a.t - b.t);
  let rows = "";
  ranked.forEach((e, i) => {
    const medal = ["🥇","🥈","🥉"][i] || (i+1);
    rows += "<tr" + (e.pid === mp.myId ? ' class="me"' : "") + '><td class="num">' + medal +
      "</td><td>" + escapeHTML(e.name) + '</td><td class="score">' + e.floor + " 層</td></tr>";
  });
  overlay.classList.remove("hidden");
  overlay.classList.remove("lite");
  overlay.innerHTML =
    '<h1>本場排名</h1>' +
    (ranked[0] ? '<p class="big">👑 冠軍:' + escapeHTML(ranked[0].name) + '</p>' : "") +
    '<table class="rank"><tr><th colspan="3">🏁 ' + mp.code + ' 房</th></tr>' + rows + '</table>' +
    '<p style="font-size:13px;opacity:.7;">成績已記錄到總排行榜</p>' +
    '<button class="start" id="rematchBtn">再來一場</button>' +
    '<button id="leaveBtn2" class="linkBtn">離開房間</button>';
  document.getElementById("rematchBtn").addEventListener("click", () => {
    mp.ref.update({ status: "waiting", seed: null, startAt: 0, resumeAt: 0, open: mp.isPublic });
    mp.ref.child("results").remove();
  });
  document.getElementById("leaveBtn2").addEventListener("click", () => { mpLeaveRoom(); showMpEntry(); });
}

// ----- 主迴圈 -----
function loop(){
  if(state === "play") update();
  else if(state === "spectate") spectateUpdate();
  if(gameMode === "multi") lerpGhosts();
  draw();
  requestAnimationFrame(loop);
}
addEventListener("beforeunload", () => { mpLeaveRoom(); });
reset("single");
renderHP();
showMenu();
loop();
})();
</script>
